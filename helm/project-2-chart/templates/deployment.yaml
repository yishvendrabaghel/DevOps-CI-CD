apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-2
  labels:
    app: project-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-2
  template:
    metadata:
      labels:
        app: project-2
    spec:
      containers:
      - name: project-2
        image: "yishu91/project-2:{{ .Values.image.tag }}"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: project-2-service
spec:
  # type: NodePort
  selector:
    app: project-2
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      # nodePort: 30005
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-2-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: project-2.local
    http:
      paths: 
      - path: /
        pathType: Prefix
        backend:
          service:
            name: project-2-service
            port:
              number: 8080